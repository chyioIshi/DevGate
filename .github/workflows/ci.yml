name: DevGate-CI
run-name: ${{github.actor}} made changes to ${{github.repository}} at ${{github.ref}}
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
        - uses: actions/checkout@v6
        - name: Set up Go
          uses: actions/setup-go@v6
          with:
            go-version-file: go.mod
        - name: Format
          run: |
            go fmt ./...
            git diff --exit-code
        - name: Vet
          run: |
            go vet ./...
        - name: Test
          run: go test -race ./...
        - name: Build
          run: go build ./cmd/devgate